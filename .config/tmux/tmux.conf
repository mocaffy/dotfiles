set -g @tmux-tabicon-preset "island-dark"
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.local/share/tmux/plugins"

# プラグインの設定
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'mocaffy/tmux-tabicon'

run '~/.local/share/tmux/plugins/tpm/tpm'

# フォーマットについて
# https://github.com/tmux/tmux/wiki/Formats

# デフォルトシェルの設定
set-option -g default-shell "/usr/bin/zsh"

# Neovim側にフォーカス情報を渡すのに必要っぽい
set-option -g focus-events on

# true color対応
# https://gist.github.com/ssh352/785395faad3163b2e0de32649f7ed45c
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# ネイティブのウィンドウにタイトルを表示する
set -g set-titles on

# タイトルのフォーマット (そのまま)
set -g set-titles-string "#T"

# ステータスラインを下に配置する
set-option -g status-position bottom

# ステータスラインの左右の領域を確保(指定しないと見切れる)
set -g status-left-length 100
set -g status-right-length 100

# タブを中央に表示する
set -g status-justify absolute-centre

# タブのフォーマットを指定する。
# set-window-option -g window-status-format "#[fg=#11131a]▏ #[fg=#5c6773]#W  "

# アクティブなタブのフォーマットを指定する
# set-window-option -g window-status-current-format "#[fg=#cbccc6,bg=#1f2733]▎ #W  "

# タブの間隔を0に
set-window-option -g window-status-separator ''

# ウィンドウのスタイルを設定
set -g window-style 'fg=default,bg=#161f2b'
set -g window-active-style 'fg=default,bg=#192330'

splitbg="#131a24"
splitfg="#dd6666"

# ステータスラインの背景色を指定する。
set-option -g status-bg $splitbg

# ペインのボーダースタイルを設定
set -g pane-active-border-style bg=$splitbg,fg=#DB4923
set -g pane-border-style bg=$splitbg,fg=#A31C5D
set -g pane-border-status bottom
set -g pane-border-format "#{?#{==:#{pane_current_command},claude},#T,}"

# vi キーバインドを有効にする
set-window-option -g mode-keys vi

# コピーモードのハイライトを Neovim の Visual に合わせる
set -g mode-style "bg=#2b3b51,fg=default"

# C-n でコピーモードに入る
bind-key -n C-n copy-mode

# v で選択開始、y でコピー（クリップボードにも入る）
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "xclip -in -selection clipboard"
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Escape / i でコピーモードを抜ける
bind-key -T copy-mode-vi Escape send-keys -X clear-selection
bind-key -T copy-mode-vi i send-keys -X cancel

# e で選択範囲を Claude ペインに送信
bind-key -T copy-mode-vi e send-keys -X copy-pipe-and-cancel "~/dotfiles/scripts/send-to-claude.sh"

# prefixキーをC-qに変更
set -g prefix C-a

# C-bのキーバインドを解除
unbind C-b

# | でペインを縦分割する
bind | split-window -h -c "#{pane_current_path}"

# - でペインを縦分割する
bind - split-window -v -c "#{pane_current_path}"

# prefix + H L でタブを切り替え
bind h previous-window
bind l next-window

bind p respawnp

# Neovim と 同じキーマップでペイン移動するための設定
# Fig がセットアップされてる前提で一部修正
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -n C-Left previous-window
bind-key -n C-Right next-window
bind-key -n C-Up switch-client -p
bind-key -n C-Down switch-client -n

bind-key -n S-Left { swap-window -t -1; previous-window }
bind-key -n S-Right { swap-window -t +1; next-window }

# set-hook -g session-window-changed "run-shell '~/dotfiles/scripts/yabacritmux/ipc/client.sh change'"
# set-hook -g window-layout-changed "run-shell '~/dotfiles/scripts/yabacritmux/ipc/client.sh resize'"
# set-hook -g window-pane-changed "run-shell '~/dotfiles/scripts/yabacritmux/ipc/client.sh focus'"
#
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Reload Config!!"

# Claude Code ペインを集める/解散する (toggle)
bind g run-shell "~/dotfiles/scripts/tmux-claude-gather.sh toggle"

